experiment:
  id: folio_openai_gpt4o_full
  description: "Full run: FOLIO validation, GPT-4o, K=3 witnesses, R_max=3"

dataset:
  name: folio
  split: validation
  path: ./datasets
  # sample_index_range: full  # omit or set to full to run the entire split

llm:
  provider: openai
  model: gpt-4o
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_tokens: 4096

pipeline:
  num_witnesses: 3
  r_max: 3
  formalize_retries: 3
  grounding_retries: 2
  solver_timeout: 60

runner:
  max_concurrency: 10
  checkpoint: true
  results_dir: ./results

prompts:
  templates_dir: ./cgbv/prompts
  few_shot_dir: ./cgbv/prompts/few_shot
