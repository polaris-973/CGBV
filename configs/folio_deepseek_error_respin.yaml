experiment:
  id: folio_deepseek_error_respin
  description: "Re-run on 12 error samples after shape-guard + safety-gate fixes"

dataset:
  name: folio
  split: validation
  path: ./datasets
  # sample_index_range: [51, 100]
  only_ids: [173, 361, 476, 527, 528, 547, 560, 562, 960, 1012, 1368]
  # only_ids: [361]

llm:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  temperature: 0.0
  max_tokens: 8192

pipeline:
  num_witnesses: 3
  r_max: 3
  formalize_retries: 3
  grounding_retries: 3
  repair_retries: 2
  bridge_retries: 2
  min_uncertain_witnesses: 2
  max_exec_workers: 8
  solver_timeout: 60
  world_assumption: owa

runner:
  max_concurrency: 5
  checkpoint: true
  results_dir: ./results

prompts:
  templates_dir: ./cgbv/prompts
  few_shot_dir: ./cgbv/prompts/few_shot
