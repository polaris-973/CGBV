experiment:
  id: naive_llm_proverqa_deepseek_debug
  description: "Naive LLM baseline: ProverQA hard, DeepSeek, zero-shot CoT"

dataset:
  name: proverqa
  split: hard
  path: ./datasets
  sample_index_range: [1, 50]
  # sample_index_range: full

llm:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  temperature: 0.0
  max_tokens: 8192

runner:
  max_concurrency: 5
  checkpoint: true
  results_dir: ./results
  results_subdir: naive_llm
