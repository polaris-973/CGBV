experiment:
  id: folio_deepseek_compile_robustness_probe
  description: "Probe compile robustness on historically fragile FOLIO cases"

dataset:
  name: folio
  split: validation
  path: ./datasets
  only_ids: [371, 440, 663]

llm:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  temperature: 0.0
  max_tokens: 8192

pipeline:
  num_witnesses: 3
  r_max: 3
  formalize_retries: 3
  grounding_retries: 3
  repair_retries: 2
  bridge_retries: 2
  min_uncertain_witnesses: 2
  max_exec_workers: 8
  solver_timeout: 60
  world_assumption: owa

runner:
  max_concurrency: 3
  checkpoint: false
  results_dir: ./results

prompts:
  templates_dir: ./cgbv/prompts
  few_shot_dir: ./cgbv/prompts/few_shot

