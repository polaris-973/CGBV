experiment:
  id: naive_llm_proverqa_glm_debug
  description: "Naive LLM baseline: ProverQA hard, GLM, zero-shot CoT"

dataset:
  name: proverqa
  split: hard
  path: ./datasets
  sample_index_range: [1, 50]
  # sample_index_range: full

llm:
  provider: glm
  model: glm-4.6
  api_key_env: ZAI_API_KEY
  temperature: 0.0
  extra_body:
    thinking:
      type: disabled
  max_tokens: 8192
  max_parallel_requests: 3
  min_request_interval: 0.0
  api_retry_count: 5
  api_retry_delay: 2.0

runner:
  max_concurrency: 3
  checkpoint: true
  results_dir: ./results
  results_subdir: naive_llm
