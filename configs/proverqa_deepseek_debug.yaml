experiment:
  id: proverqa_deepseek_debug
  description: "Debug run: ProverQA validation, DeepSeek"

dataset:
  name: proverqa
  split: hard
  path: ./datasets
  # limit: 100
  sample_index_range: [1, 2]   # 1-based inclusive range on dataset order
  # sample_index_range: [51, 100]
  # sample_index_range: full      # or just omit this field for a full run

llm:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  temperature: 0.0
  max_tokens: 8192

pipeline:
  num_witnesses: 3
  r_max: 3
  formalize_retries: 5
  grounding_retries: 3
  repair_retries: 3
  bridge_retries: 2               # Phase 1.5 bridge axiom LLM retries per orphaned premise
  batch_repair_threshold: 2       # deprecated: unified repair always uses joint mode
  min_uncertain_witnesses: 2      # minimum witnesses for Uncertain verdicts
  max_exec_workers: 8             # max concurrent code execution threads
  solver_timeout: 60
  world_assumption: owa

runner:
  max_concurrency: 5
  checkpoint: true
  results_dir: ./results

prompts:
  templates_dir: ./cgbv/prompts
  few_shot_dir: ./cgbv/prompts/few_shot
