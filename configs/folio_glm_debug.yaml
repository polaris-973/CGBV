experiment:
  id: folio_glm_debug
  description: "Debug run: FOLIO validation, GLM OpenAI-compatible endpoint"

dataset:
  name: folio
  split: validation
  path: ./datasets
  sample_index_range: [1, 50]
  # only_ids: [478, 361, 819, 173, 547, 476, 372, 527, 529, 440]

llm:
  provider: glm
  model: glm-4.6
  api_key_env: ZAI_API_KEY
  temperature: 0.0
  extra_body:
    thinking:
      type: disabled
  max_tokens: 8192
  max_parallel_requests: 5
  min_request_interval: 0.0
  api_retry_count: 5
  api_retry_delay: 2.0

pipeline:
  num_witnesses: 3
  r_max: 3
  formalize_retries: 3
  grounding_retries: 3
  repair_retries: 2
  bridge_retries: 2
  min_uncertain_witnesses: 2
  max_exec_workers: 8
  solver_timeout: 60
  world_assumption: owa

runner:
  max_concurrency: 3
  checkpoint: true
  results_dir: ./results

prompts:
  templates_dir: ./cgbv/prompts
  few_shot_dir: ./cgbv/prompts/few_shot
