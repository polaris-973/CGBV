experiment:
  id: folio_deepseek_error_respin_regress
  description: "Regression run for Phase 5 gap-analysis prompt contract bug"

dataset:
  name: folio
  split: validation
  path: ./datasets
  # only_ids: [476, 1367, 370, 372, 527, 389, 1329, 803, 1033]
  only_ids: [478, 361, 819, 173, 547, 476, 372, 527, 529, 440]

llm:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  temperature: 0.0
  max_tokens: 8192

pipeline:
  num_witnesses: 3
  r_max: 3
  formalize_retries: 3
  grounding_retries: 3
  repair_retries: 2
  bridge_retries: 2
  min_uncertain_witnesses: 2
  max_exec_workers: 8
  solver_timeout: 60
  world_assumption: owa

runner:
  max_concurrency: 5
  checkpoint: true
  results_dir: ./results

prompts:
  templates_dir: ./cgbv/prompts
  few_shot_dir: ./cgbv/prompts/few_shot
