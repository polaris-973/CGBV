examples:
- source_split: dev
  source_id: ProntoQA_6
  coverage: long unary inheritance chain
  premises:
  - Tumpuses are wumpuses.
  - Every wumpus is a rompus.
  - Each rompus is a vumpus.
  - Vumpuses are jompuses.
  - Jompuses are dull.
  - Wren is a tumpus.
  conclusion: Wren is dull.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Entity"
        ],
        "predicates": {
          "is_tumpus": "Entity->Bool",
          "is_wumpus": "Entity->Bool",
          "is_rompus": "Entity->Bool",
          "is_vumpus": "Entity->Bool",
          "is_jompus": "Entity->Bool",
          "is_dull": "Entity->Bool"
        },
        "functions": {},
        "constants": {
          "wren": "Entity"
        }
      },
      "sentences": [
        {
          "nl": "Tumpuses are wumpuses.",
          "logic": "forall x:Entity. implies(is_tumpus(x), is_wumpus(x))"
        },
        {
          "nl": "Every wumpus is a rompus.",
          "logic": "forall x:Entity. implies(is_wumpus(x), is_rompus(x))"
        },
        {
          "nl": "Each rompus is a vumpus.",
          "logic": "forall x:Entity. implies(is_rompus(x), is_vumpus(x))"
        },
        {
          "nl": "Vumpuses are jompuses.",
          "logic": "forall x:Entity. implies(is_vumpus(x), is_jompus(x))"
        },
        {
          "nl": "Jompuses are dull.",
          "logic": "forall x:Entity. implies(is_jompus(x), is_dull(x))"
        },
        {
          "nl": "Wren is a tumpus.",
          "logic": "is_tumpus(wren)"
        }
      ],
      "query": {
        "nl": "Wren is dull.",
        "logic": "is_dull(wren)"
      },
      "background": []
    }
- source_split: dev
  source_id: ProntoQA_12
  coverage: negated property at the end of a unary chain
  premises:
  - Every dumpus is a zumpus.
  - Zumpuses are yumpuses.
  - Each yumpus is a rompus.
  - Rompuses are impuses.
  - Impuses are not floral.
  - Fae is a dumpus.
  conclusion: Fae is not floral.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Entity"
        ],
        "predicates": {
          "is_dumpus": "Entity->Bool",
          "is_zumpus": "Entity->Bool",
          "is_yumpus": "Entity->Bool",
          "is_rompus": "Entity->Bool",
          "is_impus": "Entity->Bool",
          "is_floral": "Entity->Bool"
        },
        "functions": {},
        "constants": {
          "fae": "Entity"
        }
      },
      "sentences": [
        {
          "nl": "Every dumpus is a zumpus.",
          "logic": "forall x:Entity. implies(is_dumpus(x), is_zumpus(x))"
        },
        {
          "nl": "Zumpuses are yumpuses.",
          "logic": "forall x:Entity. implies(is_zumpus(x), is_yumpus(x))"
        },
        {
          "nl": "Each yumpus is a rompus.",
          "logic": "forall x:Entity. implies(is_yumpus(x), is_rompus(x))"
        },
        {
          "nl": "Rompuses are impuses.",
          "logic": "forall x:Entity. implies(is_rompus(x), is_impus(x))"
        },
        {
          "nl": "Impuses are not floral.",
          "logic": "forall x:Entity. implies(is_impus(x), not(is_floral(x)))"
        },
        {
          "nl": "Fae is a dumpus.",
          "logic": "is_dumpus(fae)"
        }
      ],
      "query": {
        "nl": "Fae is not floral.",
        "logic": "not(is_floral(fae))"
      },
      "background": []
    }
