# Few-shot examples for ProntoQA dataset (Phase 1 formalization)
# ProntoQA uses invented (non-real-world) entity and property names to prevent knowledge shortcuts

- premises:
    - "Every tumpus is large."
    - "Every large tumpus is a wumpus."
    - "Fae is a tumpus."
  conclusion: "Fae is a wumpus."
  code: |
    from z3 import *

    Entity = DeclareSort('Entity')

    fae = Const('fae', Entity)
    x   = Const('x',   Entity)

    is_tumpus = Function('is_tumpus', Entity, BoolSort())
    is_large  = Function('is_large',  Entity, BoolSort())
    is_wumpus = Function('is_wumpus', Entity, BoolSort())

    f1 = ForAll([x], Implies(is_tumpus(x), is_large(x)))
    f2 = ForAll([x], Implies(And(is_large(x), is_tumpus(x)), is_wumpus(x)))
    f3 = is_tumpus(fae)
    premises = [f1, f2, f3]

    q = is_wumpus(fae)

- premises:
    - "All vumpuses are not zumpuses."
    - "Every zumpus is a dumpus."
    - "Max is a vumpus."
  conclusion: "Max is not a dumpus."
  code: |
    from z3 import *

    Entity = DeclareSort('Entity')

    max_e = Const('max_e', Entity)
    x     = Const('x',     Entity)

    is_vumpus = Function('is_vumpus', Entity, BoolSort())
    is_zumpus = Function('is_zumpus', Entity, BoolSort())
    is_dumpus = Function('is_dumpus', Entity, BoolSort())

    f1 = ForAll([x], Implies(is_vumpus(x), Not(is_zumpus(x))))
    f2 = ForAll([x], Implies(is_zumpus(x), is_dumpus(x)))
    f3 = is_vumpus(max_e)
    premises = [f1, f2, f3]

    q = Not(is_dumpus(max_e))
