examples:
- source_split: train
  source_id: '21'
  coverage: many-sort entities, existential conclusion, multi-atom fact
  premises:
  - Miroslav Venhoda was a Czech choral conductor who specialized in the performance
    of Renaissance and Baroque music.
  - Any choral conductor is a musician.
  - Some musicians love music.
  - Miroslav Venhoda published a book in 1946 called Method of Studying Gregorian
    Chant.
  conclusion: A Czech published a book in 1946.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Person",
          "Book",
          "Year"
        ],
        "predicates": {
          "is_czech": "Person->Bool",
          "is_choral_conductor": "Person->Bool",
          "specializes_in_renaissance": "Person->Bool",
          "specializes_in_baroque": "Person->Bool",
          "is_musician": "Person->Bool",
          "loves_music": "Person->Bool",
          "published_book_in": "Person,Book,Year->Bool"
        },
        "functions": {},
        "constants": {
          "miroslav_venhoda": "Person",
          "method_of_studying_gregorian_chant": "Book",
          "y1946": "Year"
        }
      },
      "sentences": [
        {
          "nl": "Miroslav Venhoda was a Czech choral conductor who specialized in the performance of Renaissance and Baroque music.",
          "logic": "and(is_czech(miroslav_venhoda), is_choral_conductor(miroslav_venhoda), specializes_in_renaissance(miroslav_venhoda), specializes_in_baroque(miroslav_venhoda))"
        },
        {
          "nl": "Any choral conductor is a musician.",
          "logic": "forall x:Person. implies(is_choral_conductor(x), is_musician(x))"
        },
        {
          "nl": "Some musicians love music.",
          "logic": "exists x:Person. and(is_musician(x), loves_music(x))"
        },
        {
          "nl": "Miroslav Venhoda published a book in 1946 called Method of Studying Gregorian Chant.",
          "logic": "published_book_in(miroslav_venhoda, method_of_studying_gregorian_chant, y1946)"
        }
      ],
      "query": {
        "nl": "A Czech published a book in 1946.",
        "logic": "exists x:Person, b:Book. and(is_czech(x), published_book_in(x, b, y1946))"
      },
      "background": []
    }
- source_split: train
  source_id: '1128'
  coverage: disjunction, negation, person-specific alternative descriptions
  premises:
  - All people who regularly drink coffee are dependent on caffeine.
  - People regularly drink coffee, or they don't want to be addicted to caffeine,
    or both.
  - No one who doesn't want to be addicted to caffeine is unaware that caffeine is
    a drug.
  - Rina is either a student who is unaware that caffeine is a drug, or she is not
    a student and is she aware that caffeine is a drug.
  - Rina is either a student who is dependent on caffeine, or she is not a student
    and not dependent on caffeine.
  conclusion: Rina either regularly drinks coffee or is unaware that caffeine is a
    drug.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Person"
        ],
        "predicates": {
          "regularly_drinks_coffee": "Person->Bool",
          "does_not_want_caffeine_addiction": "Person->Bool",
          "is_unaware_caffeine_is_drug": "Person->Bool",
          "is_student": "Person->Bool",
          "is_dependent_on_caffeine": "Person->Bool"
        },
        "functions": {},
        "constants": {
          "rina": "Person"
        }
      },
      "sentences": [
        {
          "nl": "All people who regularly drink coffee are dependent on caffeine.",
          "logic": "forall x:Person. implies(regularly_drinks_coffee(x), is_dependent_on_caffeine(x))"
        },
        {
          "nl": "People regularly drink coffee, or they don't want to be addicted to caffeine, or both.",
          "logic": "or(regularly_drinks_coffee(rina), does_not_want_caffeine_addiction(rina))"
        },
        {
          "nl": "No one who doesn't want to be addicted to caffeine is unaware that caffeine is a drug.",
          "logic": "forall x:Person. implies(does_not_want_caffeine_addiction(x), not(is_unaware_caffeine_is_drug(x)))"
        },
        {
          "nl": "Rina is either a student who is unaware that caffeine is a drug, or she is not a student and is she aware that caffeine is a drug.",
          "logic": "or(and(is_student(rina), is_unaware_caffeine_is_drug(rina)), and(not(is_student(rina)), not(is_unaware_caffeine_is_drug(rina))))"
        },
        {
          "nl": "Rina is either a student who is dependent on caffeine, or she is not a student and not dependent on caffeine.",
          "logic": "or(and(is_student(rina), is_dependent_on_caffeine(rina)), and(not(is_student(rina)), not(is_dependent_on_caffeine(rina))))"
        }
      ],
      "query": {
        "nl": "Rina either regularly drinks coffee or is unaware that caffeine is a drug.",
        "logic": "or(regularly_drinks_coffee(rina), is_unaware_caffeine_is_drug(rina))"
      },
      "background": []
    }
- source_split: train
  source_id: '1338'
  coverage: rule chaining, negated consequent, disjunctive fact and query
  premises:
  - All eels are fish.
  - No fish are plants.
  - Everything displayed in the collection is either a plant or an animal.
  - All multicellular animals are not bacteria.
  - All animals displayed in the collection are multicellular.
  - A sea eel is displayed in the collection.
  - The sea eel is an eel or an animal or not a plant.
  conclusion: The sea eel is multicellular or is bacteria.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Entity"
        ],
        "predicates": {
          "is_eel": "Entity->Bool",
          "is_fish": "Entity->Bool",
          "is_plant": "Entity->Bool",
          "is_animal": "Entity->Bool",
          "is_displayed_in_collection": "Entity->Bool",
          "is_multicellular": "Entity->Bool",
          "is_bacteria": "Entity->Bool"
        },
        "functions": {},
        "constants": {
          "sea_eel": "Entity"
        }
      },
      "sentences": [
        {
          "nl": "All eels are fish.",
          "logic": "forall x:Entity. implies(is_eel(x), is_fish(x))"
        },
        {
          "nl": "No fish are plants.",
          "logic": "forall x:Entity. implies(is_fish(x), not(is_plant(x)))"
        },
        {
          "nl": "Everything displayed in the collection is either a plant or an animal.",
          "logic": "forall x:Entity. implies(is_displayed_in_collection(x), or(is_plant(x), is_animal(x)))"
        },
        {
          "nl": "All multicellular animals are not bacteria.",
          "logic": "forall x:Entity. implies(and(is_multicellular(x), is_animal(x)), not(is_bacteria(x)))"
        },
        {
          "nl": "All animals displayed in the collection are multicellular.",
          "logic": "forall x:Entity. implies(and(is_animal(x), is_displayed_in_collection(x)), is_multicellular(x))"
        },
        {
          "nl": "A sea eel is displayed in the collection.",
          "logic": "is_displayed_in_collection(sea_eel)"
        },
        {
          "nl": "The sea eel is an eel or an animal or not a plant.",
          "logic": "or(is_eel(sea_eel), is_animal(sea_eel), not(is_plant(sea_eel)))"
        }
      ],
      "query": {
        "nl": "The sea eel is multicellular or is bacteria.",
        "logic": "or(is_multicellular(sea_eel), is_bacteria(sea_eel))"
      },
      "background": []
    }
