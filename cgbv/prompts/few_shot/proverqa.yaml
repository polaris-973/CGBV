  - For everyone, if they develop renewable energy and help those in need, then they
    can improve people's lives.
  - Eric either improves people's lives or changes the world, but not both.
  - If Eric has innovative ideas, then he can either found a successful company or
    change the world, but not both.
  - Eric has innovative ideas.
  - Eric develops renewable energy.
  conclusion: Eric founds a successful company.
