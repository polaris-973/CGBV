- source_split: medium
  source_id: '418'
  coverage: rule with disjunctive antecedent and chained consequence
  premises:
  - Cruz puts others first.
  - Anyone who puts others first or rules with empathy is a compassionate leader.
  - For all humans, if they are a fair ruler or a compassionate leader, then they
    are respected by the people.
  conclusion: Cruz is respected by the people.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Entity"
        ],
        "predicates": {
          "puts_others_first": "Entity->Bool",
          "rules_with_empathy": "Entity->Bool",
          "is_compassionate_leader": "Entity->Bool",
          "is_fair_ruler": "Entity->Bool",
          "is_respected_by_people": "Entity->Bool"
        },
        "functions": {},
        "constants": {
          "cruz": "Entity"
        }
      },
      "sentences": [
        {
          "nl": "Cruz puts others first.",
          "logic": "puts_others_first(cruz)"
        },
        {
          "nl": "Anyone who puts others first or rules with empathy is a compassionate leader.",
          "logic": "forall x:Entity. implies(or(puts_others_first(x), rules_with_empathy(x)), is_compassionate_leader(x))"
        },
        {
          "nl": "For all humans, if they are a fair ruler or a compassionate leader, then they are respected by the people.",
          "logic": "forall x:Entity. implies(or(is_fair_ruler(x), is_compassionate_leader(x)), is_respected_by_people(x))"
        }
      ],
      "query": {
        "nl": "Cruz is respected by the people.",
        "logic": "is_respected_by_people(cruz)"
      },
      "background": []
    }
- source_split: medium
  source_id: '267'
  coverage: exclusive-or facts with negated conclusion
  premises:
  - Evelyn is either an open book or has a private nature, but not both.
  - Either Evelyn prefers to write fiction or she prefers to write nonfiction, but
    not both.
  - Evelyn either has a private nature or prefers to write fiction, but not both.
  - Evelyn is an open book.
  conclusion: Evelyn does not prefer to write nonfiction.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Entity"
        ],
        "predicates": {
          "is_open_book": "Entity->Bool",
          "has_private_nature": "Entity->Bool",
          "prefers_to_write_fiction": "Entity->Bool",
          "prefers_to_write_nonfiction": "Entity->Bool"
        },
        "functions": {},
        "constants": {
          "evelyn": "Entity"
        }
      },
      "sentences": [
        {
          "nl": "Evelyn is either an open book or has a private nature, but not both.",
          "logic": "and(or(is_open_book(evelyn), has_private_nature(evelyn)), not(and(is_open_book(evelyn), has_private_nature(evelyn))))"
        },
        {
          "nl": "Either Evelyn prefers to write fiction or she prefers to write nonfiction, but not both.",
          "logic": "and(or(prefers_to_write_fiction(evelyn), prefers_to_write_nonfiction(evelyn)), not(and(prefers_to_write_fiction(evelyn), prefers_to_write_nonfiction(evelyn))))"
        },
        {
          "nl": "Evelyn either has a private nature or prefers to write fiction, but not both.",
          "logic": "and(or(has_private_nature(evelyn), prefers_to_write_fiction(evelyn)), not(and(has_private_nature(evelyn), prefers_to_write_fiction(evelyn))))"
        },
        {
          "nl": "Evelyn is an open book.",
          "logic": "is_open_book(evelyn)"
        }
      ],
      "query": {
        "nl": "Evelyn does not prefer to write nonfiction.",
        "logic": "not(prefers_to_write_nonfiction(evelyn))"
      },
      "background": []
    }
- source_split: medium
