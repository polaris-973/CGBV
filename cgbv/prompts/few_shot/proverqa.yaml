        }
      },
      "sentences": [
        {
          "nl": "Eric helps those in need.",
          "logic": "helps_those_in_need(eric)"
        },
        {
          "nl": "For everyone, if they develop renewable energy and help those in need, then they can improve people's lives.",
          "logic": "forall x:Entity. implies(and(develops_renewable_energy(x), helps_those_in_need(x)), improves_peoples_lives(x))"
        },
        {
          "nl": "Eric either improves people's lives or changes the world, but not both.",
          "logic": "and(or(improves_peoples_lives(eric), changes_the_world(eric)), not(and(improves_peoples_lives(eric), changes_the_world(eric))))"
        },
        {
