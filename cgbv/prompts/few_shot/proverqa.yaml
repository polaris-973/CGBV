# Few-shot examples for ProverQA
# Format: premises (list), conclusion (str), code (str)

# ── Example 1 ──────────────────────────────────
- premises:
    - "Isaac does not gain confidence."
    - "If Isaac has a unique style and lacks recognition, then he deserves acclaim."
    - "If someone deserves acclaim or receives praise, then they gain confidence."
    - "Everyone either believes in themselves or is self-doubting."
    - "Isaac has a unique style."
    - "Isaac is either confident or self-doubting, but not both."
    - "If Isaac is self-doubting, then he will lack recognition."
  conclusion: "Isaac is confident."
  code: |
    from z3 import *

    Entity = DeclareSort('Entity')  # RULE 6: DeclareSort only

    # RULE 1: every entity is a named Const
    isaac = Const('isaac', Entity)

    # Predicates — multi-word names matching NL phrases closely
    gains_confidence  = Function('gains_confidence', Entity, BoolSort())
    has_unique_style  = Function('has_unique_style', Entity, BoolSort())
    lacks_recognition = Function('lacks_recognition', Entity, BoolSort())
    deserves_acclaim  = Function('deserves_acclaim', Entity, BoolSort())
    receives_praise   = Function('receives_praise', Entity, BoolSort())
    believes_himself  = Function('believes_himself', Entity, BoolSort())
    self_doubting     = Function('self_doubting', Entity, BoolSort())
    confident         = Function('confident', Entity, BoolSort())

    # RULE 3: bound variable separate from entity constants
    x = Const('x', Entity)

    # RULE 9: 7 premises in → 7 formulas in premises[]
    premises = [
        # P1: negated ground fact
        Not(gains_confidence(isaac)),
        # P2: named-entity conditional (antecedent names isaac specifically)
        Implies(And(has_unique_style(isaac), lacks_recognition(isaac)), deserves_acclaim(isaac)),
        # P3: RULE 4 — ForAll + Implies with inclusive Or in antecedent
        ForAll([x], Implies(Or(deserves_acclaim(x), receives_praise(x)), gains_confidence(x))),
        # P4: RULE 4 — ForAll + inclusive Or (disjunction without XOR)
        ForAll([x], Or(believes_himself(x), self_doubting(x))),
        # P5: ground fact
        has_unique_style(isaac),
        # P6: XOR PATTERN 1 — 'either A or B but not both' at ground level → Xor(a, b)
        Xor(confident(isaac), self_doubting(isaac)),
        # P7: named-entity conditional
        Implies(self_doubting(isaac), lacks_recognition(isaac)),
    ]
    q = confident(isaac)

# ── Example 2 ─────────────────────────────────────
- premises:
    - "Buster does not respond to calls."
    - "All dogs that listen to commands and behave properly are well-trained."
    - "Buster is either obedient or playful, but not necessarily both."
    - "Buster follows routines."
    - "Buster is either playful or loving (or both)."
    - "If Buster either responds to calls or follows routines (but not both), then he listens to commands."
    - "All well-trained dogs are obedient and have good manners."
    - "Buster behaves properly."
  conclusion: "Buster is loving."
  code: |
    from z3 import *

    Entity = DeclareSort('Entity')

    buster = Const('buster', Entity)

    responds_to_calls  = Function('responds_to_calls', Entity, BoolSort())
    listens_commands   = Function('listens_commands', Entity, BoolSort())
    behaves_properly   = Function('behaves_properly', Entity, BoolSort())
    well_trained       = Function('well_trained', Entity, BoolSort())
    is_obedient        = Function('is_obedient', Entity, BoolSort())
    playful            = Function('playful', Entity, BoolSort())
    follows_routines   = Function('follows_routines', Entity, BoolSort())
    loving             = Function('loving', Entity, BoolSort())
    has_good_manners   = Function('has_good_manners', Entity, BoolSort())

    x = Const('x', Entity)

    # RULE 9: 8 premises in → 8 formulas in premises[]
    premises = [
        # P1: negated ground fact
        Not(responds_to_calls(buster)),
        # P2: ForAll + Implies with conjunctive antecedent
        ForAll([x], Implies(And(listens_commands(x), behaves_properly(x)), well_trained(x))),
        # P3: XOR PATTERN 1 — ground XOR on buster
        Xor(is_obedient(buster), playful(buster)),
        # P4: ground fact
        follows_routines(buster),
        # P5: inclusive Or ('or both') → Or(), NOT Xor()
        Or(playful(buster), loving(buster)),
        # P6: XOR PATTERN 2 — Xor in antecedent of named-entity Implies
        #   'if A or B (but not both) → C' where antecedent names buster → no ForAll
        Implies(Xor(responds_to_calls(buster), follows_routines(buster)), listens_commands(buster)),
        # P7: ForAll + Implies with conjunctive consequent And(...)
        ForAll([x], Implies(well_trained(x), And(is_obedient(x), has_good_manners(x)))),
        # P8: ground fact
        behaves_properly(buster),
    ]
    q = loving(buster)

# ── Example 3 ─────────────────────────────────────
- premises:
    - "If Kevin has a PhD, then he either collects data alongside rivers or writes books (but not both)."
    - "For all humans, if they study marine life or love birds (or both), then they care about conservation."
    - "Kevin writes books."
    - "If someone either conducts field research or collects data alongside rivers (but not both), then they work outdoors."
    - "Kevin conducts field research."
    - "If Kevin works outdoors, then he either studies marine life or has scientific interests (or both)."
    - "Kevin either pursues artistic passions or has scientific interests, but not both."
    - "Kevin pursues artistic passions."
    - "Kevin has a PhD."
  conclusion: "Kevin cares about conservation."
  code: |
    from z3 import *

    Entity = DeclareSort('Entity')

    kevin = Const('kevin', Entity)

    has_phd                       = Function('has_phd', Entity, BoolSort())
    collect_data_alongside_rivers = Function('collect_data_alongside_rivers', Entity, BoolSort())
    write_books                   = Function('write_books', Entity, BoolSort())
    study_marine_life             = Function('study_marine_life', Entity, BoolSort())
    love_birds                    = Function('love_birds', Entity, BoolSort())
    care_about_conservation       = Function('care_about_conservation', Entity, BoolSort())
    conduct_field_research        = Function('conduct_field_research', Entity, BoolSort())
    work_outdoors                 = Function('work_outdoors', Entity, BoolSort())
    have_scientific_interests     = Function('have_scientific_interests', Entity, BoolSort())
    pursue_artistic_passions      = Function('pursue_artistic_passions', Entity, BoolSort())

    x = Const('x', Entity)

    # RULE 9: 9 premises in → 9 formulas in premises[]
    premises = [
        # P1: named-entity Implies + Xor in consequent
        #   'if Kevin has PhD then either A or B (but not both)' → Implies(cond, Xor(A, B))
        Implies(has_phd(kevin), Xor(collect_data_alongside_rivers(kevin), write_books(kevin))),
        # P2: ForAll + Implies with inclusive Or in antecedent ('or both' → Or, NOT Xor)
        ForAll([x], Implies(Or(study_marine_life(x), love_birds(x)), care_about_conservation(x))),
        # P3-P5: ground facts
        write_books(kevin),
        # P4: XOR PATTERN 3 — universal ForAll + Implies + Xor in antecedent
        ForAll([x], Implies(Xor(conduct_field_research(x), collect_data_alongside_rivers(x)), work_outdoors(x))),
        conduct_field_research(kevin),
        # P6: named-entity Implies with inclusive Or in consequent
        Implies(work_outdoors(kevin), Or(study_marine_life(kevin), have_scientific_interests(kevin))),
        # P7: ground XOR
        Xor(pursue_artistic_passions(kevin), have_scientific_interests(kevin)),
        # P8-P9: ground facts
        pursue_artistic_passions(kevin),
        has_phd(kevin),
    ]
    q = care_about_conservation(kevin)

# ── Example 4 ─────────────────────────────────────
- premises:
    - "Anyone who puts others first or makes time for others is thoughtful."
    - "Ellis makes time for others."
    - "Ellis does not stand up for himself."
    - "Anyone who treats others kindly or acts selflessly has good intentions."
    - "Ellis does not act selflessly."
    - "If someone builds trust, then they have good intentions and respect boundaries."
    - "If Ellis has good intentions, then he is either thoughtful or empathetic, but not both."
    - "Ellis either stands up for himself or treats others kindly, but not necessarily both."
  conclusion: "Ellis offers support."
  code: |
    from z3 import *

    Entity = DeclareSort('Entity')

    ellis = Const('ellis', Entity)

    puts_others_first    = Function('puts_others_first', Entity, BoolSort())
    makes_time_for_others = Function('makes_time_for_others', Entity, BoolSort())
    is_thoughtful        = Function('is_thoughtful', Entity, BoolSort())
    stands_up_for_himself = Function('stands_up_for_himself', Entity, BoolSort())
    treats_others_kindly = Function('treats_others_kindly', Entity, BoolSort())
    acts_selflessly      = Function('acts_selflessly', Entity, BoolSort())
    has_good_intentions  = Function('has_good_intentions', Entity, BoolSort())
    builds_trust         = Function('builds_trust', Entity, BoolSort())
    respects_boundaries  = Function('respects_boundaries', Entity, BoolSort())
    empathetic           = Function('empathetic', Entity, BoolSort())
    offers_support       = Function('offers_support', Entity, BoolSort())

    x = Const('x', Entity)

    # RULE 9: 8 premises in → 8 formulas in premises[]
    premises = [
        # P1: ForAll + Implies with inclusive Or in antecedent
        ForAll([x], Implies(Or(puts_others_first(x), makes_time_for_others(x)), is_thoughtful(x))),
        # P2-P3: ground facts
        makes_time_for_others(ellis),
        Not(stands_up_for_himself(ellis)),
        # P4: ForAll + Implies with inclusive Or
        ForAll([x], Implies(Or(treats_others_kindly(x), acts_selflessly(x)), has_good_intentions(x))),
        # P5: negated ground fact
        Not(acts_selflessly(ellis)),
        # P6: ForAll + Implies with conjunctive consequent
        ForAll([x], Implies(builds_trust(x), And(has_good_intentions(x), respects_boundaries(x)))),
        # P7: XOR PATTERN 4 — Xor in consequent of named-entity Implies
        #   'if Ellis has good intentions → either A or B (but not both)' → Implies(cond, Xor(A, B))
        Implies(has_good_intentions(ellis), Xor(is_thoughtful(ellis), empathetic(ellis))),
        # P8: ground XOR (Ellis-specific disjunction)
        Xor(stands_up_for_himself(ellis), treats_others_kindly(ellis)),
    ]
    q = offers_support(ellis)
