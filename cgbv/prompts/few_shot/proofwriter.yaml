  coverage: unary attribute chain
  premises:
  - Gary is quiet.
  - All quiet things are young.
  conclusion: Gary is young.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Thing"
        ],
        "predicates": {
          "is_quiet": "Thing->Bool",
          "is_young": "Thing->Bool"
        },
        "functions": {},
        "constants": {
          "gary": "Thing"
        }
      },
      "sentences": [
        {
          "nl": "Gary is quiet.",
          "logic": "is_quiet(gary)"
        },
        {
          "nl": "All quiet things are young.",
          "logic": "forall x:Thing. implies(is_quiet(x), is_young(x))"
        }
      ],
      "query": {
        "nl": "Gary is young.",
        "logic": "is_young(gary)"
      },
      "background": []
    }
