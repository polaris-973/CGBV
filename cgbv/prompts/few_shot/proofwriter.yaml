# Few-shot examples for ProofWriter dataset (Phase 1 formalization)
# ProofWriter uses chain-of-deduction with explicit rule/fact structure

- premises:
    - "All cold things are round."
    - "All round things are big."
    - "The dog is cold."
  conclusion: "The dog is big."
  code: |
    from z3 import *

    Thing = DeclareSort('Thing')

    dog = Const('dog', Thing)
    x   = Const('x',   Thing)

    is_cold  = Function('is_cold',  Thing, BoolSort())
    is_round = Function('is_round', Thing, BoolSort())
    is_big   = Function('is_big',   Thing, BoolSort())

    f1 = ForAll([x], Implies(is_cold(x), is_round(x)))
    f2 = ForAll([x], Implies(is_round(x), is_big(x)))
    f3 = is_cold(dog)
    premises = [f1, f2, f3]

    q = is_big(dog)

- premises:
    - "All quiet things are white."
    - "The cat is quiet."
    - "The mouse is quiet."
    - "White things are not loud."
  conclusion: "The cat is not loud."
  code: |
    from z3 import *

    Thing = DeclareSort('Thing')

    cat   = Const('cat',   Thing)
    mouse = Const('mouse', Thing)
    x     = Const('x',     Thing)

    is_quiet = Function('is_quiet', Thing, BoolSort())
    is_white = Function('is_white', Thing, BoolSort())
    is_loud  = Function('is_loud',  Thing, BoolSort())

    f1 = ForAll([x], Implies(is_quiet(x), is_white(x)))
    f2 = is_quiet(cat)
    f3 = is_quiet(mouse)
    f4 = ForAll([x], Implies(is_white(x), Not(is_loud(x))))
    premises = [f1, f2, f3, f4]

    q = Not(is_loud(cat))
