- source_split: train
  source_id: ProofWriter_RelNoneg-OWA-D5-774_Q11
  coverage: binary relation chain
  premises:
  - The cow eats the dog.
  - If something eats the dog then it sees the cow.
  - If something sees the cow then it eats the mouse.
  conclusion: The cow eats the mouse.
  dsl: |-
    {
      "symbols": {
        "sorts": [
          "Thing"
        ],
        "predicates": {
          "eats": "Thing,Thing->Bool",
          "sees": "Thing,Thing->Bool"
        },
        "functions": {},
        "constants": {
          "cow": "Thing",
          "dog": "Thing",
          "mouse": "Thing"
        }
      },
      "sentences": [
        {
          "nl": "The cow eats the dog.",
          "logic": "eats(cow, dog)"
        },
        {
          "nl": "If something eats the dog then it sees the cow.",
          "logic": "forall x:Thing. implies(eats(x, dog), sees(x, cow))"
        },
        {
          "nl": "If something sees the cow then it eats the mouse.",
          "logic": "forall x:Thing. implies(sees(x, cow), eats(x, mouse))"
        }
      ],
      "query": {
        "nl": "The cow eats the mouse.",
        "logic": "eats(cow, mouse)"
      },
      "background": []
    }
